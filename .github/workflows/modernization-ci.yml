name: Modernization CI

# Fast PR gate for the modernization workstream (journey map + enrichment tooling).
# The full iDempiere build/analysis runs via the heavier SonarQube workflow (manual dispatch).
on:
  pull_request:
    paths: ["modernization/**", ".github/workflows/modernization-ci.yml"]
  push:
    branches: [master]
    paths: ["modernization/**"]
  workflow_dispatch:

jobs:
  journey-map:
    name: Build journey map
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modernization/journey-map
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modernization/journey-map/package-lock.json
      - run: npm ci
      - run: npm run build

  tooling:
    name: Enrichment tooling tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modernization/tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  o2c-allocation:
    name: O2C allocation service (parity tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modernization/services/o2c-allocation
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: o2c
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d o2c"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: o2c
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modernization/services/o2c-allocation/package-lock.json
      - run: npm ci
      - run: npm test

  p2p-procurement:
    name: P2P procurement service (parity tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modernization/services/p2p-procurement
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: p2p
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d p2p"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: p2p
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modernization/services/p2p-procurement/package-lock.json
      - run: npm ci
      - run: npm test
